<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomona · Orchard Field Survey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="orchard/orchard.css" />

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- data layer (classic — runs first, sets window.ORCHARD + window.bus) -->
  <script src="orchard/orchard-data.js"></script>

  <!-- three.js module map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="scene"></div>
    <div id="labels"></div>
    <div id="ui"></div>
    <div id="tooltip"></div>
    <div id="splash">
      <div class="spin"></div>
      <div>unfolding the orchard…</div>
    </div>
  </div>

  <!-- 3D scene (module, deferred) -->
  <script type="module" src="orchard/orchard-scene.js"></script>
  <!-- React chrome (babel) -->
  <script type="text/babel" src="orchard/orchard-ui.jsx"></script>

  <script>
    window.bus = window.bus || new EventTarget();
    window.bus.addEventListener('orchard:ready', function () {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function () { s.style.display = 'none'; }, 520); }
    });
    // safety: hide splash even if ready never fires
    setTimeout(function () {
      var s = document.getElementById('splash');
      if (s && s.style.opacity !== '0') { s.style.opacity = '0'; setTimeout(function () { s.style.display = 'none'; }, 520); }
    }, 6000);
  </script>
</body>
</html>
